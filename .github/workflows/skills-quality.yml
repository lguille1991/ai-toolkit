name: Skills Quality

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/**"
      - ".github/workflows/skills-quality.yml"
      - "README.md"
      - "marketplace.json"
  push:
    branches: ["main"]
    paths:
      - "skills/**"
      - "scripts/**"
      - ".github/workflows/skills-quality.yml"
      - "README.md"
      - "marketplace.json"

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install markdownlint
        run: gem install mdl

      - name: Run markdownlint
        run: ruby scripts/markdown_lint.rb

      - name: Run skills audit
        run: ruby scripts/skills_audit.rb

      - name: Run trigger/functional/performance harness
        run: ruby scripts/skills_harness.rb

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck --version

      - name: Run shellcheck
        run: |
          # Find all shell scripts and check them
          SCRIPTS=$(find . -name "*.sh" -type f | grep -v ".git")
          if [ -z "$SCRIPTS" ]; then
            echo "No shell scripts found."
            exit 0
          fi
          
          echo "Found shell scripts:"
          echo "$SCRIPTS"
          echo ""
          
          # Run shellcheck on all scripts
          echo "$SCRIPTS" | while read -r script; do
            echo "Checking: $script"
          done
          
          # Use process substitution to properly capture exit code
          shellcheck $SCRIPTS